##############################################################################
# SPIRE Agent — DaemonSet
# Runs on every node, connects to SPIRE Server, and exposes the
# Workload API Unix socket that containers use to fetch SVIDs.
##############################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-agent
  namespace: spire
automountServiceAccountToken: true   # needed for PSAT node attestation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-agent-cluster-role
rules:
  - apiGroups: [""]
    resources: [nodes, pods]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-agent-cluster-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-agent-cluster-role
subjects:
  - kind: ServiceAccount
    name: spire-agent
    namespace: spire
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-agent-config
  namespace: spire
data:
  agent.conf: |
    agent {
      data_dir = "/run/spire/data"
      log_level = "INFO"
      trust_domain = "cluster.local"
      server_address = "spire-server.spire.svc.cluster.local"
      server_port = "8081"
      socket_path = "/run/spire/sockets/agent.sock"
      # Agents automatically rotate SVIDs before expiry
      svid_key_type = "ec-p256"
    }

    plugins {
      NodeAttestor "k8s_psat" {
        plugin_data {
          cluster = "codex-cluster"
          token_path = "/var/run/secrets/tokens/spire-agent"
        }
      }

      KeyManager "memory" {
        plugin_data {}
      }

      WorkloadAttestor "k8s" {
        plugin_data {
          skip_kubelet_verification = false
          # Verify pod UIDs against the kubelet API for strong attestation
          use_new_container_locator = true
        }
      }
    }

    health_checks {
      listener_enabled = true
      bind_address = "0.0.0.0"
      bind_port = "8080"
      live_path = "/live"
      ready_path = "/ready"
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spire-agent
  namespace: spire
  labels:
    app: spire-agent
spec:
  selector:
    matchLabels:
      app: spire-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: spire-agent
    spec:
      hostPID: true     # Required: SPIRE agent needs host PID namespace for workload attestation
      serviceAccountName: spire-agent
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        - name: init-server-wait
          image: cgr.dev/chainguard/busybox@sha256:a0a4a5f415b2df38ed4244c3ad1b3b8efceb74a64699c3c8e94b9a7dd75e69d7
          command:
            - sh
            - -c
            - |
              until nc -z spire-server.spire.svc.cluster.local 8081; do
                echo "Waiting for SPIRE server..."
                sleep 2
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      containers:
        - name: spire-agent
          # renovate: datasource=docker depName=cgr.dev/chainguard/spire-agent
          image: cgr.dev/chainguard/spire-agent@sha256:e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3
          imagePullPolicy: Always
          args:
            - -config
            - /run/spire/config/agent.conf
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: spire-agent-config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
            - name: spire-agent-data
              mountPath: /run/spire/data
            - name: spire-token
              mountPath: /var/run/secrets/tokens
      volumes:
        - name: spire-agent-config
          configMap:
            name: spire-agent-config
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
        - name: spire-agent-data
          hostPath:
            path: /run/spire/data
            type: DirectoryOrCreate
        - name: spire-token
          projected:
            sources:
              - serviceAccountToken:
                  path: spire-agent
                  expirationSeconds: 7200
                  audience: spire-server
