##############################################################################
# Renovate Bot: Auto-update image digests
# Runs weekly to check for updated Chainguard image digests and opens PRs.
# Combined with Kyverno's digest enforcement, this keeps images current
# without allowing unreviewed changes to reach production.
##############################################################################
name: Renovate Digest Updates

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v40
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
