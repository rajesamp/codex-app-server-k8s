apiVersion: apps/v1
kind: Deployment
metadata:
  name: codex-app-server
  namespace: codex-agents
  labels:
    app: codex-app-server
    app.kubernetes.io/component: app-server
    app.kubernetes.io/part-of: codex-agent-sandbox
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codex-app-server
  template:
    metadata:
      labels:
        app: codex-app-server
        # Cilium identity label — used in CiliumNetworkPolicy selectors
        security.cilium.io/egress-profile: codex-agent
      annotations:
        # SPIRE injects the SVID via the SPIFFE Workload API Unix socket.
        spiffe.io/spiffe-id: "spiffe://cluster.local/ns/codex-agents/sa/codex-agent"
        # Require image digest verification by the Kyverno admission controller.
        kyverno.io/require-image-digest: "true"
    spec:
      # ── Isolation ──────────────────────────────────────────────────────────
      runtimeClassName: kata-qemu          # VM-level sandbox via Kata Containers

      serviceAccountName: codex-agent
      automountServiceAccountToken: false

      # ── Security Context (Pod) ─────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532            # nonroot UID (Chainguard default)
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
        supplementalGroups: []

      # ── Init: SPIRE SVID fetch ─────────────────────────────────────────────
      initContainers:
        - name: spire-wait
          # Chainguard hardened busybox — pinned digest, zero CVEs
          # renovate: datasource=docker depName=cgr.dev/chainguard/busybox
          image: cgr.dev/chainguard/busybox@sha256:f9ca35446158a61c6fc535fa3154d0378af13800834c46ade63c94f1fc25d839
          command:
            - sh
            - -c
            - |
              echo "Waiting for SPIRE Workload API socket..."
              until [ -S /run/spire/sockets/agent.sock ]; do
                sleep 1
              done
              echo "SPIRE socket ready."
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          # CKV_K8S_10/11/12/13: init containers must also declare CPU+memory requests+limits
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
          volumeMounts:
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true

      containers:
        - name: codex-app-server
          # ── Supply Chain: Hardened image, pinned digest ──────────────────
          # Base: Chainguard distroless — no shell, no package manager, zero CVEs.
          # Tag is for human readability; the digest is what admission enforces.
          # renovate: datasource=docker depName=cgr.dev/chainguard/node
          image: cgr.dev/chainguard/node@sha256:13d25cd2ccb10ecb9f98b7694fcdef9405dcfac7925b9edd2b44869c0d3330b9
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            - name: CODEX_SKILLS_DIR
              value: "/skills"
            - name: SPIFFE_ENDPOINT_SOCKET
              value: "unix:///run/spire/sockets/agent.sock"
            - name: NODE_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            # CKV_K8S_35: OPENAI_API_KEY is read from a mounted secret file, not an env var.
            # The app reads the key from /run/secrets/openai-api-key at startup.
            - name: OPENAI_API_KEY_FILE
              value: "/run/secrets/openai-api-key"

          # ── Security Context (Container) ──────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
            runAsNonRoot: true
            runAsUser: 65532

          # ── Probes ────────────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          # ── Resources ─────────────────────────────────────────────────────
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"

          # ── Volume Mounts ─────────────────────────────────────────────────
          volumeMounts:
            # Skills ConfigMap — Codex discovers skills from this directory
            - name: codex-skills
              mountPath: /skills
              readOnly: true
            # SPIRE Workload API socket — SVID delivery
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
            # CKV_K8S_35: Secret mounted as a file — never as an env var
            - name: openai-secret
              mountPath: /run/secrets
              readOnly: true
            # Writable tmp for ephemeral agent scratch space
            - name: tmp
              mountPath: /tmp

      # ── Volumes ────────────────────────────────────────────────────────────
      volumes:
        - name: codex-skills
          configMap:
            name: codex-skills
            defaultMode: 0440        # read-only, no execute
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
        # CKV_K8S_35: Secret mounted as a projected volume file
        - name: openai-secret
          secret:
            secretName: codex-api-credentials
            defaultMode: 0400        # owner read-only
            items:
              - key: openai-api-key
                path: openai-api-key
        - name: tmp
          emptyDir:
            medium: Memory           # in-memory only, not persisted to disk
            sizeLimit: 256Mi

      # ── Topology ──────────────────────────────────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: codex-app-server
