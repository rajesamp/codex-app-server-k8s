apiVersion: v1
kind: ServiceAccount
metadata:
  name: codex-agent
  namespace: codex-agents
  annotations:
    # SPIFFE workload identity: the SPIRE agent will issue an SVID to pods
    # bound to this service account.
    spiffe.io/spiffe-id: "spiffe://cluster.local/ns/codex-agents/sa/codex-agent"
    # Disable legacy token automounting — SPIRE SVIDs are the sole identity source.
  labels:
    app.kubernetes.io/component: workload-identity
    app.kubernetes.io/part-of: codex-agent-sandbox
automountServiceAccountToken: false
---
# RBAC: codex-agent SA has no cluster permissions.
# Principle of least privilege — agents interact with the outside world
# exclusively through declared MCP servers, not through the Kubernetes API.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: codex-agent-role
  namespace: codex-agents
rules: []   # intentionally empty
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: codex-agent-rolebinding
  namespace: codex-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: codex-agent-role
subjects:
  - kind: ServiceAccount
    name: codex-agent
    namespace: codex-agents
