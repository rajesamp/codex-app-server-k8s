apiVersion: v1
kind: ConfigMap
metadata:
  name: codex-skills
  namespace: codex-agents
  labels:
    app.kubernetes.io/component: skills
    app.kubernetes.io/part-of: codex-agent-sandbox
# Skills are mounted read-only into each agent pod at /skills.
# Codex App Server discovers skill definitions at runtime by scanning
# this directory. Adding or updating skills requires only updating this
# ConfigMap — no image rebuild needed.
data:
  # ── Example skill: web-search ────────────────────────────────────────────
  web-search.yaml: |
    name: web-search
    version: "1.0.0"
    description: >
      Enables the agent to perform web searches via an approved MCP server.
    tools:
      - name: search
        description: Search the web for a given query.
        input_schema:
          type: object
          properties:
            query:
              type: string
              description: The search query string.
          required: [query]
    mcp_server: "https://mcp.internal.example.com/search"

  # ── Example skill: code-execution ────────────────────────────────────────
  code-execution.yaml: |
    name: code-execution
    version: "1.0.0"
    description: >
      Allows the agent to execute sandboxed Python code snippets.
    tools:
      - name: run_python
        description: Execute a Python snippet and return stdout/stderr.
        input_schema:
          type: object
          properties:
            code:
              type: string
              description: Python source code to run.
          required: [code]
    mcp_server: "https://mcp.internal.example.com/exec"
